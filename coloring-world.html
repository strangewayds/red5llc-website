<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coloring World — Red 5</title>
  <meta name="description" content="Coloring World — pick a picture and bring it to life with color, then print it at home!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
  <style>
    body{ margin:0; font-family:var(--font-body,'Nunito',sans-serif); background:#2a2052; color:#fff; }
    .cw-wrap{ min-height:100vh; display:flex; flex-direction:column; }
    /* Top bar */
    .cw-top{ display:flex; align-items:center; gap:.8rem; padding:.7rem 1rem; background:linear-gradient(90deg,#3a2d6b,#2a2052); border-bottom:1px solid rgba(255,255,255,.08); flex-wrap:wrap; }
    .cw-back{ display:inline-flex; align-items:center; gap:.4rem; background:rgba(255,255,255,.12); color:#fff; text-decoration:none; font-family:var(--font-display,'Fredoka'); font-weight:600; padding:.45rem .9rem; border-radius:999px; font-size:.92rem; }
    .cw-back:hover{ background:rgba(255,255,255,.2); }
    .cw-title{ font-family:var(--font-display,'Fredoka'); font-weight:700; font-size:1.35rem; margin:0; letter-spacing:.5px; }
    .cw-title .a{ color:#ffd23f; }
    .cw-spacer{ flex:1; }
    .cw-btn{ border:none; cursor:pointer; font-family:var(--font-display,'Fredoka'); font-weight:600; font-size:.92rem; padding:.5rem 1.05rem; border-radius:999px; color:#fff; display:inline-flex; align-items:center; gap:.4rem; box-shadow:0 6px 14px rgba(0,0,0,.2); }
    .cw-btn.save{ background:linear-gradient(135deg,#3ddc84,#22b566); }
    .cw-btn.print{ background:linear-gradient(135deg,#ff5ba6,#e21f86); }
    .cw-btn:hover{ filter:brightness(1.07); }
    /* Body layout */
    .cw-main{ flex:1; display:grid; grid-template-columns:1fr 280px; gap:1rem; padding:1rem; align-items:start; }
    @media (max-width:820px){ .cw-main{ grid-template-columns:1fr; } }
    .cw-stagewrap{ background:#241b48; border-radius:18px; padding:1rem; box-shadow:inset 0 0 0 1px rgba(255,255,255,.06); }
    .cw-toolsrow{ display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:.8rem; }
    .cw-tool{ border:none; cursor:pointer; background:rgba(255,255,255,.1); color:#fff; font-family:var(--font-display,'Fredoka'); font-weight:600; font-size:.88rem; padding:.45rem .85rem; border-radius:12px; display:inline-flex; align-items:center; gap:.35rem; }
    .cw-tool.active{ background:linear-gradient(135deg,#7c4dff,#5e40d8); box-shadow:0 4px 12px rgba(124,77,255,.5); }
    .cw-tool:hover{ filter:brightness(1.08); }
    .cw-stage{ background:#fff; border-radius:14px; overflow:hidden; touch-action:none; box-shadow:0 10px 30px rgba(0,0,0,.3); }
    .cw-stage svg{ display:block; width:100%; height:auto; }
    .cw-stage svg .rg{ cursor:pointer; transition:fill .08s ease; }
    /* Right panel */
    .cw-panel{ background:#241b48; border-radius:18px; padding:1rem; box-shadow:inset 0 0 0 1px rgba(255,255,255,.06); }
    .cw-panel h2{ font-family:var(--font-display,'Fredoka'); font-size:1rem; margin:0 0 .5rem; color:#cfc6ff; }
    .cw-swatches{ display:grid; grid-template-columns:repeat(8,1fr); gap:6px; margin-bottom:1rem; }
    .cw-sw{ width:100%; aspect-ratio:1; border-radius:8px; border:2px solid rgba(255,255,255,.15); cursor:pointer; padding:0; }
    .cw-sw.sel{ border-color:#fff; box-shadow:0 0 0 2px #ffd23f; transform:scale(1.05); }
    .cw-current{ display:flex; align-items:center; gap:.6rem; margin-bottom:1rem; }
    .cw-current .dot{ width:34px; height:34px; border-radius:50%; border:3px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .cw-current span{ font-weight:700; font-size:.9rem; color:#cfc6ff; }
    .cw-size{ margin-bottom:1rem; }
    .cw-size label{ font-size:.85rem; color:#cfc6ff; font-weight:700; display:block; margin-bottom:.3rem; }
    .cw-size input{ width:100%; }
    .cw-tip{ font-size:.8rem; color:#a99fd6; line-height:1.4; }
    /* Template picker */
    .cw-picker{ padding:0 1rem 1.2rem; }
    .cw-picker h2{ font-family:var(--font-display,'Fredoka'); font-size:1rem; color:#cfc6ff; margin:.2rem 0 .6rem; }
    .cw-thumbs{ display:flex; gap:.6rem; overflow-x:auto; padding-bottom:.4rem; }
    .cw-thumb{ flex:none; width:104px; height:80px; background:#fff; border:3px solid transparent; border-radius:12px; cursor:pointer; overflow:hidden; padding:0; }
    .cw-thumb.sel{ border-color:#ffd23f; }
    .cw-thumb svg{ width:100%; height:100%; display:block; }
    .cw-mascot{ display:flex; align-items:center; gap:.5rem; margin-top:1rem; background:rgba(255,255,255,.06); border-radius:12px; padding:.5rem .7rem; }
    .cw-mascot .star{ font-size:1.6rem; }
    .cw-mascot p{ margin:0; font-size:.82rem; color:#ffe9a8; font-weight:700; }
    .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:#2b2150; color:#fff; padding:.7rem 1.2rem; border-radius:999px; box-shadow:0 10px 30px rgba(0,0,0,.4); opacity:0; pointer-events:none; transition:.25s; font-weight:600; z-index:50; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="cw-wrap">
    <div class="cw-top">
      <a class="cw-back" href="create-zone.html">← Back to Create Zone</a>
      <h1 class="cw-title">COLORING <span class="a">WORLD</span></h1>
      <div class="cw-spacer"></div>
      <button class="cw-btn save" id="cwSave" type="button">⬇ Save</button>
      <button class="cw-btn print" id="cwPrint" type="button">🖨 Print</button>
    </div>

    <div class="cw-main">
      <div class="cw-stagewrap">
        <div class="cw-toolsrow">
          <button class="cw-tool active" data-tool="fill" type="button">🪣 Fill</button>
          <button class="cw-tool" data-tool="brush" type="button">🖌 Brush</button>
          <button class="cw-tool" data-tool="eraser" type="button">🧽 Eraser</button>
          <button class="cw-tool" id="cwUndo" type="button">↶ Undo</button>
          <button class="cw-tool" id="cwClear" type="button">🗑 Clear</button>
        </div>
        <div class="cw-stage" id="cwStage"></div>
      </div>

      <div class="cw-panel">
        <div class="cw-current"><span>Color:</span><div class="dot" id="cwDot"></div></div>
        <h2>Colors</h2>
        <div class="cw-swatches" id="cwSwatches"></div>
        <div class="cw-size">
          <label>Brush size: <b id="cwSizeVal">12</b></label>
          <input type="range" id="cwSize" min="3" max="40" value="12">
        </div>
        <p class="cw-tip">Pick a color, then tap a part of the picture to fill it. Use the Brush to draw, then Save or Print your art!</p>
        <div class="cw-mascot"><span class="star">🌟</span><p>You're doing amazing!</p></div>
      </div>
    </div>

    <div class="cw-picker">
      <h2>Choose a picture</h2>
      <div class="cw-thumbs" id="cwThumbs"></div>
    </div>
  </div>

  <div class="toast" id="cwToast"></div>
  <script src="coloring-world.js" defer></script>
</body>
</html>
